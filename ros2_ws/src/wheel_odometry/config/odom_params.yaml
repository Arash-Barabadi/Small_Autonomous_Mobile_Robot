wheel_odometry_node:
  ros__parameters:



    # Radius of one wheel in metres
    # Current value = 33.5 mm
    wheel_radius: 0.0335

    # Axle-to-axle distance between the two wheel contact points (metres)
    # Must match track_width in ESP32 firmware (0.163 m)
    track_width: 0.163

    # Encoder ticks per full wheel revolution
    # Calibrate by rolling the robot exactly 1.0 m and reading /wheel_ticks
    ticks_per_rev: 585.0

    # ---------------------------------------------------------------
    # Frame IDs
    # Must match your URDF / static TF / EKF / Nav2 config
    # ---------------------------------------------------------------
    odom_frame:  "odom"
    base_frame:  "base_link"

    # ---------------------------------------------------------------
    # Topic names
    # ---------------------------------------------------------------

    # Input: raw encoder ticks from ESP32
    ticks_topic: "wheel_ticks"

    # Output: computed odometry
    odom_topic:  "odom"

    # ---------------------------------------------------------------
    # TF publishing
    # Set false when robot_localization EKF is running (ekf publish_tf: true)
    # Set true  only when running odom node standalone without EKF
    # ---------------------------------------------------------------
    publish_tf: true

    # ---------------------------------------------------------------
    # Publish rate
    # Should match or exceed EKF frequency (ekf.yaml frequency: 50.0)
    # ---------------------------------------------------------------
    publish_rate_hz: 50.0

    # ---------------------------------------------------------------
    # Velocity timeout
    # If no new ticks arrive within this time (seconds),
    # linear and angular velocity are set to zero.
    # Prevents phantom motion being reported when robot is stopped.
    # ---------------------------------------------------------------
    vel_timeout_s: 0.2
